networks:
  mvp_net:
    name: mvp_net

services:
  orchestrator:
    build: ./orchestrator
    image: whalesbot/orchestrator:latest
    container_name: orchestrator
    environment:
      ORCHESTRATOR_PORT: ${ORCHESTRATOR_PORT:-8080}
      HEALTHCHECK_INTERVAL_SEC: ${HEALTHCHECK_INTERVAL_SEC:-5}
      HEALTHCHECK_FAIL_THRESHOLD: ${HEALTHCHECK_FAIL_THRESHOLD:-3}
      ORCHESTRATOR_UPSTREAM_TIMEOUT_SEC: ${ORCHESTRATOR_UPSTREAM_TIMEOUT_SEC:-240}
    ports:
      - "${ORCHESTRATOR_PORT:-8080}:8080"
    networks: [mvp_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  session:
    build: ./session
    image: whalesbot/session:latest
    container_name: session
    environment:
      SESSION_PORT: ${SESSION_PORT:-8090}
      SESSION_MAX_MESSAGES: ${SESSION_MAX_MESSAGES:-40}
      SESSION_IDLE_SEC: ${SESSION_IDLE_SEC:-86400}
      SESSION_DB_PATH: /data/session.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: session
    volumes:
      - session_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SESSION_PORT:-8090}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  llm-openai:
    build: ./llm-openai
    image: whalesbot/llm-openai:latest
    container_name: llm-openai
    environment:
      LLM_OPENAI_PORT: ${LLM_OPENAI_PORT:-8081}
      LLM_CONFIG_PATH: /data/llm-config.json
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: llm-openai
    # Lets configured base URLs like http://localhost:... reach the host on Linux.
    # No-op on Docker Desktop (macOS/Windows) where the name is built-in.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - llm_openai_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${LLM_OPENAI_PORT:-8081}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  runtime:
    build: ./runtime
    image: whalesbot/runtime:latest
    container_name: runtime
    environment:
      RUNTIME_PORT: ${RUNTIME_PORT:-8085}
      REACT_MAX_STEPS: ${REACT_MAX_STEPS:-16}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SESSION_URL: http://session:8090
      LLM_OPENAI_URL: http://llm-openai:8081
      SERVICE_HOST: runtime
      RUNTIME_SKILLS_INJECT: ${RUNTIME_SKILLS_INJECT:-1}
      RUNTIME_SKILLS_TOP_K: ${RUNTIME_SKILLS_TOP_K:-5}
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
      session: { condition: service_started }
      llm-openai: { condition: service_started }
      user-docker-manager: { condition: service_started }
      skills: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${RUNTIME_PORT:-8085}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  adapter-telegram:
    build: ./adapter-telegram
    image: whalesbot/adapter-telegram:latest
    container_name: adapter-telegram
    environment:
      ADAPTER_TELEGRAM_PORT: ${ADAPTER_TELEGRAM_PORT:-8084}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SESSION_URL: http://session:8090
      ADAPTER_TELEGRAM_CHAT_TIMEOUT_SEC: ${ADAPTER_TELEGRAM_CHAT_TIMEOUT_SEC:-240}
      SERVICE_HOST: adapter-telegram
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${ADAPTER_TELEGRAM_PORT:-8084}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  user-docker-manager:
    build: ./user-docker-manager
    image: whalesbot/user-docker-manager:latest
    container_name: user-docker-manager
    environment:
      USER_DOCKER_MANAGER_PORT: ${USER_DOCKER_MANAGER_PORT:-8082}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: user-docker-manager
      USERDOCKER_DEFAULT_IMAGE: whalesbot/userdocker-base:latest
      USERDOCKER_ALLOWED_IMAGES: ${USERDOCKER_ALLOWED_IMAGES:-whalesbot/userdocker-base:latest,whalesbot/userdocker-golang:latest}
      DOCKER_NETWORK: mvp_net
      USERDOCKER_IDLE_HOURS: ${USERDOCKER_IDLE_HOURS:-24}
      USERDOCKER_IDLE_CHECK_SEC: ${USERDOCKER_IDLE_CHECK_SEC:-300}
      USERDOCKER_TEMP_TTL_SEC: ${USERDOCKER_TEMP_TTL_SEC:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
      userdocker-base: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${USER_DOCKER_MANAGER_PORT:-8082}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  skills:
    build: ./skills
    image: whalesbot/skills:latest
    container_name: skills
    environment:
      SKILLS_PORT: ${SKILLS_PORT:-8093}
      SKILLS_DB_PATH: /data/skills.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: skills
    volumes:
      - skills_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SKILLS_PORT:-8093}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  logger:
    build: ./logger
    image: whalesbot/logger:latest
    container_name: logger
    environment:
      LOGGER_PORT: ${LOGGER_PORT:-8086}
      LOGGER_DB_PATH: /data/logger.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: logger
    volumes:
      - logger_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${LOGGER_PORT:-8086}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  stats:
    build: ./stats
    image: whalesbot/stats:latest
    container_name: stats
    environment:
      STATS_PORT: ${STATS_PORT:-8092}
      STATS_DB_PATH: /data/stats.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: stats
    volumes:
      - stats_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${STATS_PORT:-8092}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  workspace:
    build: ./workspace
    image: whalesbot/workspace:latest
    container_name: workspace
    environment:
      WORKSPACE_PORT: ${WORKSPACE_PORT:-8088}
      WORKSPACE_ROOT: /data/workspaces
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: workspace
    volumes:
      - workspace_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${WORKSPACE_PORT:-8088}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  webui:
    build: ./webui
    image: whalesbot/webui:latest
    container_name: webui
    environment:
      # Browser-facing URL — must be reachable from the host, not just from
      # inside the mvp_net network.
      ORCHESTRATOR_URL: http://localhost:${ORCHESTRATOR_PORT:-8080}
    ports:
      - "${WEBUI_PORT:-3000}:80"
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Build-only helper. Having this service in the compose file ensures
  # `docker compose up --build` builds the userdocker-base image that
  # user-docker-manager uses this image when spawning new userdocker containers.
  # We override the entrypoint so the container itself does not register —
  # real userdocker containers are created on demand via
  # POST /api/v1/tools/user-dockers.
  userdocker-base:
    build:
      context: ./userdocker-base
      args:
        FINAL_BASE_IMAGE: alpine:3.20
    image: whalesbot/userdocker-base:latest
    container_name: userdocker-base
    entrypoint: ["sleep"]
    command: ["infinity"]
    networks: [mvp_net]
    restart: unless-stopped

  # Build-only helper image with Go toolchain preinstalled for compile tasks.
  # Must still satisfy userdocker interface contract.
  userdocker-golang:
    build:
      context: ./userdocker-base
      args:
        FINAL_BASE_IMAGE: golang:1.22-alpine
    image: whalesbot/userdocker-golang:latest
    container_name: userdocker-golang
    entrypoint: ["sleep"]
    command: ["infinity"]
    networks: [mvp_net]
    restart: unless-stopped

volumes:
  session_data:
  skills_data:
  logger_data:
  stats_data:
  workspace_data:
  llm_openai_data:
