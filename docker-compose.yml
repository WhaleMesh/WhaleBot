networks:
  mvp_net:
    name: mvp_net

services:
  orchestrator:
    build: ./orchestrator
    image: whalesbot/orchestrator:latest
    container_name: orchestrator
    environment:
      ORCHESTRATOR_PORT: ${ORCHESTRATOR_PORT:-8080}
      HEALTHCHECK_INTERVAL_SEC: ${HEALTHCHECK_INTERVAL_SEC:-5}
      HEALTHCHECK_FAIL_THRESHOLD: ${HEALTHCHECK_FAIL_THRESHOLD:-3}
      ORCHESTRATOR_UPSTREAM_TIMEOUT_SEC: ${ORCHESTRATOR_UPSTREAM_TIMEOUT_SEC:-240}
    ports:
      - "${ORCHESTRATOR_PORT:-8080}:8080"
    networks: [mvp_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  session:
    build: ./session
    image: whalesbot/session:latest
    container_name: session
    environment:
      SESSION_PORT: ${SESSION_PORT:-8090}
      SESSION_MAX_MESSAGES: ${SESSION_MAX_MESSAGES:-40}
      SESSION_DB_PATH: /data/session.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: session
    volumes:
      - session_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SESSION_PORT:-8090}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  chatmodel:
    build: ./chatmodel
    image: whalesbot/chatmodel:latest
    container_name: chatmodel
    environment:
      CHATMODEL_PORT: ${CHATMODEL_PORT:-8081}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai_compatible}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: chatmodel
    # Lets MODEL_BASE_URL=http://localhost:... reach the host on Linux.
    # No-op on Docker Desktop (macOS/Windows) where the name is built-in.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CHATMODEL_PORT:-8081}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  runtime:
    build: ./runtime
    image: whalesbot/runtime:latest
    container_name: runtime
    environment:
      RUNTIME_PORT: ${RUNTIME_PORT:-8085}
      REACT_MAX_STEPS: ${REACT_MAX_STEPS:-16}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SESSION_URL: http://session:8090
      CHATMODEL_URL: http://chatmodel:8081
      SERVICE_HOST: runtime
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
      session: { condition: service_started }
      chatmodel: { condition: service_started }
      user-docker-manager: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${RUNTIME_PORT:-8085}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  im-telegram:
    build: ./im-telegram
    image: whalesbot/im-telegram:latest
    container_name: im-telegram
    environment:
      IM_TELEGRAM_PORT: ${IM_TELEGRAM_PORT:-8084}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SESSION_URL: http://session:8090
      IM_TELEGRAM_CHAT_TIMEOUT_SEC: ${IM_TELEGRAM_CHAT_TIMEOUT_SEC:-240}
      SERVICE_HOST: im-telegram
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${IM_TELEGRAM_PORT:-8084}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  user-docker-manager:
    build: ./user-docker-manager
    image: whalesbot/user-docker-manager:latest
    container_name: user-docker-manager
    environment:
      USER_DOCKER_MANAGER_PORT: ${USER_DOCKER_MANAGER_PORT:-8082}
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: user-docker-manager
      USERDOCKER_DEFAULT_IMAGE: whalesbot/userdocker-base:latest
      USERDOCKER_ALLOWED_IMAGES: ${USERDOCKER_ALLOWED_IMAGES:-whalesbot/userdocker-base:latest,whalesbot/userdocker-golang:latest}
      DOCKER_NETWORK: mvp_net
      USERDOCKER_IDLE_HOURS: ${USERDOCKER_IDLE_HOURS:-24}
      USERDOCKER_IDLE_CHECK_SEC: ${USERDOCKER_IDLE_CHECK_SEC:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
      userdocker-base: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${USER_DOCKER_MANAGER_PORT:-8082}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  logger:
    build: ./logger
    image: whalesbot/logger:latest
    container_name: logger
    environment:
      LOGGER_PORT: ${LOGGER_PORT:-8086}
      LOGGER_DB_PATH: /data/logger.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: logger
    volumes:
      - logger_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${LOGGER_PORT:-8086}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  memory:
    build: ./memory
    image: whalesbot/memory:latest
    container_name: memory
    environment:
      MEMORY_PORT: ${MEMORY_PORT:-8087}
      MEMORY_DB_PATH: /data/memory.db
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: memory
    volumes:
      - memory_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${MEMORY_PORT:-8087}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  workspace:
    build: ./workspace
    image: whalesbot/workspace:latest
    container_name: workspace
    environment:
      WORKSPACE_PORT: ${WORKSPACE_PORT:-8088}
      WORKSPACE_ROOT: /data/workspaces
      ORCHESTRATOR_URL: http://orchestrator:8080
      SERVICE_HOST: workspace
    volumes:
      - workspace_data:/data
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${WORKSPACE_PORT:-8088}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  webui:
    build: ./webui
    image: whalesbot/webui:latest
    container_name: webui
    environment:
      # Browser-facing URL — must be reachable from the host, not just from
      # inside the mvp_net network.
      ORCHESTRATOR_URL: http://localhost:${ORCHESTRATOR_PORT:-8080}
    ports:
      - "${WEBUI_PORT:-3000}:80"
    networks: [mvp_net]
    depends_on:
      orchestrator: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Build-only helper. Having this service in the compose file ensures
  # `docker compose up --build` builds the userdocker-base image that
  # user-docker-manager uses this image when spawning new userdocker containers.
  # We override the entrypoint so the container itself does not register —
  # real userdocker containers are created on demand via
  # POST /api/v1/tools/user-dockers.
  userdocker-base:
    build:
      context: ./userdocker-base
      args:
        FINAL_BASE_IMAGE: alpine:3.20
    image: whalesbot/userdocker-base:latest
    container_name: userdocker-base
    entrypoint: ["sleep"]
    command: ["infinity"]
    networks: [mvp_net]
    restart: unless-stopped

  # Build-only helper image with Go toolchain preinstalled for compile tasks.
  # Must still satisfy userdocker interface contract.
  userdocker-golang:
    build:
      context: ./userdocker-base
      args:
        FINAL_BASE_IMAGE: golang:1.22-alpine
    image: whalesbot/userdocker-golang:latest
    container_name: userdocker-golang
    entrypoint: ["sleep"]
    command: ["infinity"]
    networks: [mvp_net]
    restart: unless-stopped

volumes:
  session_data:
  logger_data:
  memory_data:
  workspace_data:
