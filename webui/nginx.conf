server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve a runtime-generated env.js so the same image works with any
    # orchestrator URL without rebuilding.
    location = /env.js {
        add_header Cache-Control "no-store";
        try_files /env.js =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
